services:
  db:
    image: postgres:18-alpine
    container_name: 5sec-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-5secondanswers}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - 5sec-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 5sec-api
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      KNEX_ENV: ${KNEX_ENV:-development}
      DB_HOST: db
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-5secondanswers}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      PORT: 5000
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      GROQ_TRANSCRIPTION_MODEL: ${GROQ_TRANSCRIPTION_MODEL:-whisper-large-v3-turbo}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_HTTP_REFERER: ${OPENROUTER_HTTP_REFERER:-https://5second.app}
      OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE:-5SecondAnswers}
      OPENROUTER_SMART_MODEL: ${OPENROUTER_SMART_MODEL:-mistralai/mixtral-8x7b-instruct}
      OPENROUTER_MODEL_COMPLEX: ${OPENROUTER_MODEL_COMPLEX:-mistralai/mixtral-8x22b-instruct}
      NEMOTRON_API_KEY: ${NEMOTRON_API_KEY}
      NEMOTRON_BASE_URL: ${NEMOTRON_BASE_URL:-https://integrate.api.nvidia.com/v1}
      NEMOTRON_BRAIN_MODEL: ${NEMOTRON_BRAIN_MODEL:-nvidia/nemotron-3-super-120b-a12b}
      AI_ROUTING_ENABLED: ${AI_ROUTING_ENABLED:-true}
      AI_HTTP_TIMEOUT_MS: ${AI_HTTP_TIMEOUT_MS:-30000}
      AI_MAX_RETRIES: ${AI_MAX_RETRIES:-2}
      AI_RETRY_BASE_MS: ${AI_RETRY_BASE_MS:-1000}
      GOOGLE_FACT_CHECK_API_KEY: ${GOOGLE_FACT_CHECK_API_KEY}
      GOOGLE_FACT_CHECK_LANG: ${GOOGLE_FACT_CHECK_LANG:-en}
      ADMIN_KEY: ${ADMIN_KEY:-admin-secret-key-123}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      RUN_DB_SEED: ${RUN_DB_SEED:-false}
    ports:
      - "${HOST_PORT:-5000}:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/src/backend/uploads
    networks:
      - 5sec-network
    command: >
      sh -c "npm run db:migrate &&
             if [ \"$RUN_DB_SEED\" = \"true\" ]; then npm run db:seed; else echo 'Skipping db seed'; fi &&
             npm start"

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  5sec-network:
    driver: bridge
