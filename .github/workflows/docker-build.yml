name: Docker Build & Deploy

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  REGISTRY: docker.io
  IMAGE_NAME: yourusername/5sec-answers-api

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./5second-answers-api
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    runs-on: ubuntu-latest
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: 5secondanswers
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 5000
      NODE_ENV: test
      KNEX_ENV: development
      OPENAI_API_KEY: test-openai-key
      GOOGLE_FACT_CHECK_API_KEY: test-google-key
      ADMIN_KEY: admin-secret-key-123
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: 5secondanswers
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: '5second-answers-api/package-lock.json'

      - name: Install dependencies
        run: cd 5second-answers-api && npm install

      - name: Run migrations
        run: cd 5second-answers-api && npm run db:migrate

      - name: Seed test data
        run: cd 5second-answers-api && npm run db:seed

      - name: Run linter
        run: cd 5second-answers-api && npm run lint --if-present

      - name: Start API server
        run: |
          cd 5second-answers-api
          nohup node src/server.js > api.log 2>&1 &

      - name: Wait for API healthcheck
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:5000/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "API failed to start"
          cat 5second-answers-api/api.log
          exit 1

      - name: Test API endpoints
        run: cd 5second-answers-api && node run-api-tests.js

      - name: Print API logs on failure
        if: failure()
        run: cat 5second-answers-api/api.log

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build, test]
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to production
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          echo "Deploying to production..."
          # Add your deployment script here
          # Examples:
          # - SSH to server and pull latest Docker image
          # - Trigger Heroku deployment
          # - Update AWS ECS service
